name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build gen-registry
        run: go build ./cmd/gen-registry/

      - name: Generate registry.yaml
        run: ./gen-registry distros "${{ github.ref_name }}" > registry.yaml

      - name: Commit and push registry.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.yaml
          git commit -m "chore: regenerate registry.yaml for ${{ github.ref_name }}"
          git push origin main
